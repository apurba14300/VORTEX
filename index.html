
<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODQIT | Developer Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              CODQIT: {
                light: '#f8fafc',
                dark: '#000000',
                darkCard: '#0a0a0a',
                darkBorder: '#1a1a1a',
                dim: '#0f172a',
                dimCard: '#1e293b',
                dimBorder: '#334155'
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'reveal': 'reveal 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards',
              'glow-pulse': 'glowPulse 3s infinite ease-in-out',
              'scan': 'scanLine 4s linear infinite',
              'float': 'float 6s ease-in-out infinite',
              'glitch': 'glitch 1s linear infinite',
              'glitch-2': 'glitch2 0.3s cubic-bezier(.25, .46, .45, .94) both infinite',
              'warp-speed': 'warpSpeed 20s linear infinite',
              'ticker': 'ticker 30s linear infinite',
              'firework': 'firework 2s ease-out infinite',
              'snow': 'snow 10s linear infinite',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { transform: 'translateY(40px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              reveal: { '0%': { width: '0%', opacity: '0' }, '100%': { width: '100%', opacity: '1' } },
              glowPulse: { '0%, 100%': { opacity: '0.3', filter: 'blur(40px)' }, '50%': { opacity: '0.6', filter: 'blur(60px)' } },
              scanLine: { '0%': { transform: 'translateY(-100%)' }, '100%': { transform: 'translateY(100%)' } },
              float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } },
              warpSpeed: { '0%': { transform: 'translateZ(0) rotate(0deg)' }, '100%': { transform: 'translateZ(1000px) rotate(360deg)' } },
              ticker: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(-100%)' } },
              firework: {
                '0%': { transform: 'translateY(0) scale(0)', opacity: '1' },
                '100%': { transform: 'translateY(-100px) scale(2)', opacity: '0' }
              },
              snow: {
                '0%': { transform: 'translateY(-10%) rotate(0deg)' },
                '100%': { transform: 'translateY(110%) rotate(360deg)' }
              },
              glitch: {
                '0%': { clipPath: 'inset(80% 0 0 0)' },
                '10%': { clipPath: 'inset(10% 0 85% 0)' },
                '20%': { clipPath: 'inset(40% 0 43% 0)' },
                '30%': { clipPath: 'inset(0% 0 0% 0)' }
              },
              glitch2: {
                '0%': { transform: 'translate(0)' },
                '20%': { transform: 'translate(-2px, 2px)' },
                '40%': { transform: 'translate(-2px, -2px)' },
                '60%': { transform: 'translate(2px, 2px)' },
                '80%': { transform: 'translate(2px, -2px)' },
                '100%': { transform: 'translate(0)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
      
      * {
        transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                    border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                    color 0.3s ease;
      }

      body {
        font-family: 'Inter', sans-serif;
        overflow: hidden;
      }

      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { 
        background: rgba(99, 102, 241, 0.2); 
        border-radius: 10px; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.5); }

      html.dark body { background-color: #000000; color: #f8fafc; }
      html.dim body { background-color: #0f172a; color: #e2e8f0; }
      html.light body { background-color: #f8fafc; color: #0f172a; }

      .glass {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.2s; }
      .stagger-3 { animation-delay: 0.3s; }
      .stagger-4 { animation-delay: 0.4s; }
      .stagger-5 { animation-delay: 0.5s; }

      .perspective-2000 {
        perspective: 2000px;
      }
      
      .hologram-grid {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(99, 102, 241, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
      }

      .festive-confetti {
        background-image: radial-gradient(circle, #ff0000 1px, transparent 1px), radial-gradient(circle, #00ff00 1px, transparent 1px), radial-gradient(circle, #0000ff 1px, transparent 1px);
        background-size: 100px 100px;
        background-position: 0 0, 50px 50px, 25px 75px;
      }

      .snow-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        background: url('https://www.transparenttextures.com/patterns/snow.png');
        opacity: 0.3;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="transition-colors duration-500">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
